<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Палитра цветов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Палитра цветов</h1>
        
        <div class="form-container">
            <h2>Добавить новый цвет</h2>
            <form id="colorForm">
                <div class="form-group">
                    <label for="colorName">Название цвета:</label>
                    <input type="text" id="colorName" name="colorName">
                    <div class="error" id="nameError"></div>
                </div>
                
                <div class="form-group">
                    <label for="colorType">Тип цвета:</label>
                    <select id="colorType" name="colorType">
                        <option value="RGB">RGB</option>
                        <option value="RGBA">RGBA</option>
                        <option value="HEX">HEX</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="colorCode">Код цвета:</label>
                    <input type="text" id="colorCode" name="colorCode">
                    <div class="error" id="codeError"></div>
                </div>
                
                <button type="submit">Save</button>
            </form>
        </div>
        
        <div class="colors-container">
            <h2>Сохранённые цвета</h2>
            <div id="colorsList" class="colors-list"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
